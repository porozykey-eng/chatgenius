<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>ChatGenius AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ================================
       Design System — Apple/Linear Minimal Industrial
       极简工业风：克制、专业、高效（与 options.html 3.0 对齐）
       ================================ */

    /* Light Theme (默认) — 纯净暖白 + Indigo 品牌强调 + 精致阴影层次 */
    :root[data-theme="light"] {
      color-scheme: light;

      /* 中性色：统一 zinc 全系（消除色温混用） */
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-elevated: #ffffff;
      --bg-hover: #f4f4f5;
      --bg-active: #e4e4e7;
      --bg-tertiary: #f4f4f5;

      /* 文字色：统一 zinc 系（原 slate 改为 zinc，色温一致） */
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-tertiary: #a1a1aa;
      --text-placeholder: #d4d4d8;

      /* 品牌色：深靛蓝（自定义色号，比 indigo-500 更深更饱和） */
      --accent: #4361ee;           /* 深靛蓝（原 #6366f1） */
      --accent-hover: #3a56d4;     /* 深一档（原 #4f46e5） */
      --accent-active: #2e4ab8;    /* 更深（原 #4338ca） */
      --accent-light: #eef2ff;     /* 保持 indigo-50 */
      --accent-glow: rgba(67, 97, 238, 0.16);  /* 原 rgba(99,102,241,0.16) */
      --accent-text: #3a56d4;      /* 文字用深色（原 #4f46e5） */

      /* Indigo 完整色阶 50-900（参考色阶，保留不动） */
      --accent-50: #eef2ff;
      --accent-100: #e0e7ff;
      --accent-200: #c7d2fe;
      --accent-300: #a5b4fc;
      --accent-400: #818cf8;
      --accent-500: #6366f1;
      --accent-600: #4f46e5;
      --accent-700: #4338ca;
      --accent-800: #3730a3;
      --accent-900: #312e81;

      /* 辅助紫（用于渐变第二色、次要强调） */
      --accent-secondary: #725ac1;          /* 辅助紫 */
      --accent-secondary-hover: #5f48a8;    /* 深一档 */

      /* 语义色：提升背景透明度至 12%（原 8% 几乎不可见） */
      --success: #16a34a;
      --success-bg: rgba(22, 163, 74, 0.12);
      --success-text: #15803d;
      --warning: #d97706;
      --warning-bg: rgba(217, 119, 6, 0.12);
      --error: #dc2626;
      --error-bg: rgba(220, 38, 38, 0.12);

      /* 精致阴影：混入品牌色调，消除生硬感 */
      --shadow-xs: 0 1px 2px rgba(24, 24, 27, 0.05);
      --shadow-sm: 0 1px 3px rgba(24, 24, 27, 0.07), 0 1px 2px rgba(24, 24, 27, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(24, 24, 27, 0.08), 0 2px 4px -2px rgba(24, 24, 27, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(24, 24, 27, 0.09), 0 4px 6px -4px rgba(24, 24, 27, 0.04);
      --shadow-xl: 0 20px 25px -5px rgba(24, 24, 27, 0.1), 0 8px 10px -6px rgba(24, 24, 27, 0.04);

      /* Elevation token（卡片层次体系，替代 shadow-xs/sm 混淆） */
      --elevation-0: none;
      --elevation-1: var(--shadow-xs);
      --elevation-2: var(--shadow-sm);
      --elevation-3: var(--shadow-md);

      /* 边框：subtle 比 hover 深一档，恢复边界可见性 */
      --border-subtle: #e4e4e7;   /* zinc-200，原 f4f4f5 与 bg-hover 相同 */
      --border-default: #d4d4d8;  /* zinc-300，原 e4e4e7 */
      --border-strong: #a1a1aa;   /* zinc-400，原 cbd5e1 slate */
      --border-focus: #4361ee;    /* 深靛蓝 */
      --border-accent-width: 3px; /* 统一左边框强调宽度 token */

      /* Sticky header 玻璃态 */
      --bg-glass: rgba(255, 255, 255, 0.8);
      --bg-glass-border: rgba(212, 212, 216, 0.6);

      /* 品牌渐变：深靛蓝 + 辅助紫（主色+辅助紫） */
      --gradient-brand: linear-gradient(135deg, #4361ee 0%, #725ac1 100%);
      --gradient-brand-hover: linear-gradient(135deg, #3a56d4 0%, #5f48a8 100%);
      --gradient-subtle: linear-gradient(135deg, #eef2ff 0%, #f3f0ff 100%);
      --shadow-brand: 0 4px 14px rgba(67, 97, 238, 0.28);
      --shadow-brand-lg: 0 8px 24px rgba(67, 97, 238, 0.32);

      /* 字号体系：合并 2xs/xs 为单一 12px（原 11/12 差距过小） */
      --font-size-xs: 12px;     /* kbd / badge / 极小标签 */
      --font-size-sm: 13px;     /* 辅助文字 */
      --font-size-base: 14px;   /* 正文 / 表单（统一）*/
      --font-size-lg: 16px;     /* panel-title / 重要正文 */
      --font-size-xl: 20px;     /* page-title */
      --font-size-2xl: 28px;    /* 大数字展示 */
      --font-size-3xl: 40px;    /* empty-state 插画 */

      /* 行高 token（统一 6 种硬编码） */
      --leading-tight: 1.25;    /* 标题 / 紧凑 */
      --leading-normal: 1.5;    /* 正文（默认） */
      --leading-relaxed: 1.7;   /* textarea / 长文本 */

      /* 字重 token（统一硬编码） */
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;

      /* 圆角：新增 2xl 档（大容器用） */
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 20px;
      --radius-full: 9999px;

      /* 极速克制动效 */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);     /* 默认：入场/持续 */
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* 回弹：nav 竖条/modal */
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);    /* 退出/收起 */
      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;

      /* 字体：加入中文 fallback（消除中英混排跳跃） */
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;

      /* 卡片 padding 分级 token */
      --card-pad-lg: 24px;   /* panel 主卡片 */
      --card-pad-md: 16px;   /* persona-card / guide-entry */
      --card-pad-sm: 12px;   /* shortcut-card / faq-item */

      /* 图标按钮尺寸 token */
      --icon-btn-sm: 28px;
      --icon-btn-md: 32px;
      --icon-btn-lg: 40px;

      /* 输入框复合 token */
      --input-bg: var(--bg-primary);
      --input-border: var(--border-default);
      --input-focus-shadow: 0 0 0 3px var(--accent-glow);
      --input-height: 40px;

      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-7: 28px;
      --spacing-8: 32px;
      --spacing-10: 40px;
      --spacing-12: 48px;
      --spacing-16: 64px;

      /* 悬浮按钮预览舞台背景（模拟网页背景，深色渐变让玻璃/极简主题可见） */
      --bg-preview-stage: linear-gradient(135deg, #2a2a3e 0%, #3d3d5c 50%, #1a1a2e 100%);

      /* z-index 层级 Token */
      --z-base: 0;
      --z-header: 100;
      --z-toast: 900;
      --z-modal: 1000;
      --z-cmd-palette: 1100;

      /* 预览舞台按钮颜色（模拟外部网页背景，亮暗模式相同） */
      --preview-btn-text: #1d1d1f;
      --preview-btn-text-light: #ffffff;
      --preview-btn-minimal-bg: rgba(255, 255, 255, 1);
      --preview-btn-border: rgba(0, 0, 0, 0.06);
      --preview-btn-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      --preview-btn-glass-bg: rgba(255, 255, 255, 0.12);
      --preview-btn-glass-border: rgba(255, 255, 255, 0.18);
      --preview-btn-glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);

      /* 强调色背景上的白色文字（亮暗模式均为白色） */
      --text-on-accent: #ffffff;
    }

    /* Dark Theme — 深邃石墨 + Indigo 品牌强调 + 高光层次 */
    :root[data-theme="dark"] {
      color-scheme: dark;

      /* 背景色：统一带微蓝调（消除色温跳跃） */
      --bg-primary: #0a0a0c;      /* 偏蓝黑，原 0f0f11 */
      --bg-secondary: #141417;    /* 偏蓝灰，原 18181b */
      --bg-elevated: #1c1c20;     /* 偏蓝灰，原 1c1c1f */
      --bg-hover: #27272a;
      --bg-active: #3f3f46;
      --bg-tertiary: #27272a;

      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-tertiary: #71717a;
      --text-placeholder: #71717a;  /* 提亮，原 52525b 低于 WCAG AA */

      /* 品牌色：深靛蓝（暗色用亮一档保证对比度） */
      --accent: #5a7fff;           /* 暗色用亮一档（原 #818cf8） */
      --accent-hover: #7a96ff;     /* 原 indigo-300 */
      --accent-active: #9ab0ff;    /* 原 indigo-200 */
      --accent-light: #1a1f4b;     /* 深靛蓝暗色底（原 #1e1b4b） */
      --accent-glow: rgba(90, 127, 255, 0.24);
      --accent-text: #7a96ff;

      /* Indigo 完整色阶（参考色阶，保留不动） */
      --accent-50: #eef2ff;
      --accent-100: #e0e7ff;
      --accent-200: #c7d2fe;
      --accent-300: #a5b4fc;
      --accent-400: #818cf8;
      --accent-500: #6366f1;
      --accent-600: #4f46e5;
      --accent-700: #4338ca;
      --accent-800: #3730a3;
      --accent-900: #312e81;

      /* 辅助紫（暗色亮一档） */
      --accent-secondary: #9a85d4;   /* 暗色亮一档 */
      --accent-secondary-hover: #8270bd;

      /* 语义色：暗色透明度 14% */
      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.14);
      --success-text: #4ade80;
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.14);
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.14);

      /* 暗色阴影：混入品牌色调（深靛蓝 RGB 67,97,238），消除纯黑污渍感 */
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(67, 97, 238, 0.04);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.5), 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(67, 97, 238, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.6), 0 2px 4px -2px rgba(0, 0, 0, 0.4), 0 2px 4px rgba(67, 97, 238, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.7), 0 4px 6px -4px rgba(0, 0, 0, 0.4), 0 4px 6px rgba(67, 97, 238, 0.08);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.8), 0 8px 10px -6px rgba(0, 0, 0, 0.5), 0 8px 10px rgba(67, 97, 238, 0.1);

      /* Elevation token */
      --elevation-0: none;
      --elevation-1: var(--shadow-xs);
      --elevation-2: var(--shadow-sm);
      --elevation-3: var(--shadow-md);

      /* 边框：subtle 比 hover 深一档（原与 bg-hover 相同导致边界消失） */
      --border-subtle: #3f3f46;   /* zinc-700，原 27272a 与 bg-hover 相同 */
      --border-default: #52525b;  /* zinc-600，原 3f3f46 */
      --border-strong: #71717a;   /* zinc-500，原 52525b */
      --border-focus: #5a7fff;    /* 深靛蓝暗色 */
      --border-accent-width: 3px;

      /* Sticky header 玻璃态（暗色） */
      --bg-glass: rgba(10, 10, 12, 0.8);
      --bg-glass-border: rgba(63, 63, 70, 0.6);

      /* 品牌渐变：深靛蓝 + 辅助紫（暗色） */
      --gradient-brand: linear-gradient(135deg, #5a7fff 0%, #9a85d4 100%);
      --gradient-brand-hover: linear-gradient(135deg, #4361ee 0%, #725ac1 100%);
      --gradient-subtle: linear-gradient(135deg, #1a1f4b 0%, #1c1c20 100%);
      --shadow-brand: 0 4px 14px rgba(90, 127, 255, 0.32);
      --shadow-brand-lg: 0 8px 24px rgba(90, 127, 255, 0.38);

      /* 字号体系（与 light 一致） */
      --font-size-xs: 12px;
      --font-size-sm: 13px;
      --font-size-base: 14px;
      --font-size-lg: 16px;
      --font-size-xl: 20px;
      --font-size-2xl: 28px;
      --font-size-3xl: 40px;

      /* 行高 / 字重 token */
      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.7;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 20px;
      --radius-full: 9999px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --duration-fast: 150ms;
      --duration-base: 200ms;
      --duration-slow: 300ms;

      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;

      /* 卡片 padding / 图标按钮 / 输入框 token */
      --card-pad-lg: 24px;
      --card-pad-md: 16px;
      --card-pad-sm: 12px;
      --icon-btn-sm: 28px;
      --icon-btn-md: 32px;
      --icon-btn-lg: 40px;
      --input-bg: var(--bg-elevated);
      --input-border: var(--border-default);
      --input-focus-shadow: 0 0 0 3px var(--accent-glow);
      --input-height: 40px;

      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-7: 28px;
      --spacing-8: 32px;
      --spacing-10: 40px;
      --spacing-12: 48px;
      --spacing-16: 64px;

      /* 悬浮按钮预览舞台背景 */
      --bg-preview-stage: linear-gradient(135deg, #2a2a3e 0%, #3d3d5c 50%, #1a1a2e 100%);

      /* z-index 层级 Token */
      --z-base: 0;
      --z-header: 100;
      --z-toast: 900;
      --z-modal: 1000;
      --z-cmd-palette: 1100;

      /* 预览舞台按钮颜色（模拟外部网页背景，亮暗模式相同） */
      --preview-btn-text: #1d1d1f;
      --preview-btn-text-light: #ffffff;
      --preview-btn-minimal-bg: rgba(255, 255, 255, 1);
      --preview-btn-border: rgba(0, 0, 0, 0.06);
      --preview-btn-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      --preview-btn-glass-bg: rgba(255, 255, 255, 0.12);
      --preview-btn-glass-border: rgba(255, 255, 255, 0.18);
      --preview-btn-glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);

      /* 强调色背景上的白色文字（亮暗模式均为白色） */
      --text-on-accent: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 360px;
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .app-header {
      padding: var(--spacing-4) var(--spacing-4) var(--spacing-3);
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      border-bottom: 1px solid var(--border-subtle);
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--gradient-brand);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-brand);
      flex-shrink: 0;
    }

    .brand-icon svg { width: 18px; height: 18px; color: var(--text-on-accent); }

    .brand-name { font-size: var(--font-size-lg); font-weight: 600; letter-spacing: -0.02em; flex: 1; }

    .header-actions { display: flex; gap: var(--spacing-1); }

    .icon-btn {
      width: var(--icon-btn-md); height: var(--icon-btn-md); border-radius: var(--radius-md); border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .icon-btn:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }

    .content { padding: var(--spacing-3) var(--spacing-4) var(--spacing-4); }

    .status-bar {
      padding: var(--spacing-3) var(--spacing-4);
      background: rgba(0, 0, 0, 0.02);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      margin-bottom: var(--spacing-3);
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--error); flex-shrink: 0;
    }
    .status-dot.active { background: var(--success); box-shadow: 0 0 8px rgba(22, 163, 74, 0.5); }
    .status-text { font-size: var(--font-size-xs); font-weight: 500; color: var(--text-secondary); flex: 1; }

    /* 当前模型信息条 */
    .model-info-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-2) var(--spacing-3);
      background: rgba(99, 102, 241, 0.04);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-3);
    }
    .model-info-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-md);
      background: var(--gradient-brand);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-on-accent); flex-shrink: 0;
    }
    .model-info-content { flex: 1; min-width: 0; }
    .model-info-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 1px; }
    .model-info-name {
      font-size: var(--font-size-xs); font-weight: 600; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .model-info-edit {
      width: var(--icon-btn-sm); height: var(--icon-btn-sm); border-radius: var(--radius-sm); border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out); flex-shrink: 0;
    }
    .model-info-edit:hover { background: var(--bg-hover); color: var(--text-primary); }
    .model-info-edit:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }

    /* Quick actions row */
    .quick-actions {
      display: flex; align-items: center; gap: var(--spacing-2); margin-bottom: var(--spacing-3);
    }

    /* AI toggle switch */
    .toggle-wrap {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .toggle-label { font-size: var(--font-size-xs); color: var(--text-secondary); font-weight: 500; }
    .toggle-switch {
      position: relative; width: 36px; height: 20px; background: var(--bg-hover);
      border-radius: var(--radius-full); cursor: pointer; transition: background var(--duration-fast) var(--ease-out);
      border: none; padding: 0;
    }
    .toggle-switch.active { background: var(--success); }
    .toggle-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; background: var(--text-on-accent); border-radius: 50%;
      transition: transform var(--duration-fast) var(--ease-out);
    }
    .toggle-switch.active::after { transform: translateX(16px); }
    .toggle-switch:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }

    /* Usage progress bar */
    .usage-bar-wrap { flex: 1; }
    .usage-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-1); }
    .usage-bar-label { font-size: var(--font-size-xs); color: var(--text-tertiary); }
    .usage-bar-count { font-size: var(--font-size-xs); font-weight: 600; color: var(--text-secondary); }
    .usage-bar-track {
      width: 100%; height: 5px; background: var(--bg-hover); border-radius: 3px; overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%; border-radius: 3px; transition: width var(--duration-slow) var(--ease-out), background var(--duration-slow) var(--ease-out);
    }

    /* License bar */
    .license-bar {
      padding: var(--spacing-3) var(--spacing-4);
      background: rgba(99, 102, 241, 0.04);
      border-radius: var(--radius-md);
      border: 1px solid rgba(99, 102, 241, 0.1);
      display: flex; align-items: center; gap: var(--spacing-2);
      margin-bottom: var(--spacing-3);
    }
    .license-bar .license-text { flex: 1; font-size: var(--font-size-xs); font-weight: 500; }
    .license-bar .upgrade-btn {
      background: var(--gradient-brand); color: var(--text-on-accent); border: none;
      padding: var(--spacing-1) var(--spacing-2); border-radius: var(--radius-md); font-size: var(--font-size-xs); font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }
    .license-bar .upgrade-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-brand); }
    .license-bar .upgrade-btn:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }
    .license-bar .upgrade-btn-warning {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }
    .license-bar .upgrade-btn-error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      animation: btn-pulse 2s ease-in-out infinite;
    }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 8px 2px rgba(239, 68, 68, 0.3); }
    }

    /* Persona chips */
    .persona-section { margin-bottom: var(--spacing-3); }
    .persona-section-label { font-size: var(--font-size-xs); color: var(--text-tertiary); margin-bottom: 6px; }
    .persona-chips {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: var(--spacing-1);
      scrollbar-width: thin;
    }
    .persona-chips::-webkit-scrollbar { height: 3px; }
    .persona-chips::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }
    .persona-chip {
      flex-shrink: 0; padding: 6px var(--spacing-3); border-radius: var(--radius-full);
      border: 1px solid var(--border-default); background: transparent;
      font-size: var(--font-size-xs); font-weight: 500; color: var(--text-secondary);
      cursor: pointer;
      transition: border-color var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
      white-space: nowrap;
      font-family: var(--font-sans);
    }
    .persona-chip:hover { border-color: var(--text-tertiary); color: var(--text-primary); }
    .persona-chip:active { transform: scale(0.97); }
    .persona-chip.active {
      background: var(--accent-light);
      color: var(--accent-text);
      border-color: var(--accent);
    }
    .persona-chip:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }

    .btn {
      width: 100%; height: 40px; border-radius: var(--radius-md);
      font-size: var(--font-size-sm); font-weight: 600; font-family: var(--font-sans);
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
      display: flex; align-items: center; justify-content: center;
      gap: 6px; border: none; margin-bottom: var(--spacing-2);
    }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { box-shadow: var(--shadow-brand), 0 0 0 3px var(--accent-glow); outline: none; }
    .btn-primary { background: var(--gradient-brand); color: var(--text-on-accent); box-shadow: var(--shadow-brand); }
    .btn-primary:hover { background: var(--gradient-brand-hover); transform: translateY(-1px); box-shadow: var(--shadow-brand); }
    .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-default); }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

    .not-configured { text-align: center; padding: var(--spacing-5) 0; }
    .not-configured p { font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: var(--spacing-4); }

    .footer {
      padding: var(--spacing-3) var(--spacing-4); text-align: center; font-size: var(--font-size-xs);
      color: var(--text-tertiary); border-top: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%">
        <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
        <path d="M7 12a5 5 0 0 1 10 0"/>
        <path d="M4 12a8 8 0 0 1 16 0"/>
      </svg>
    </div>
    <span class="brand-name">ChatGenius AI</span>
    <div class="header-actions">
      <button class="icon-btn" id="openOptionsBtn" type="button" aria-label="打开设置页" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </header>

  <div class="content">
    <div class="status-bar" role="status" aria-live="polite">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">正在加载状态...</span>
    </div>

    <!-- 当前模型信息（已配置时显示） -->
    <div class="model-info-bar" id="modelInfoBar" style="display:none;">
      <div class="model-info-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
      </div>
      <div class="model-info-content">
        <div class="model-info-label">当前模型</div>
        <div class="model-info-name" id="modelInfoName">—</div>
      </div>
      <button class="model-info-edit" id="modelInfoEdit" type="button" aria-label="编辑 API 配置" title="编辑配置">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      </button>
    </div>

    <!-- License Status Bar -->
    <div class="license-bar" id="licenseBar" style="display:none;">
      <span class="license-text" id="licenseStatus">加载中...</span>
      <button class="upgrade-btn" id="upgradeBtn" type="button">升级 Pro</button>
    </div>

    <div id="quickPanel" style="display:none;">
      <!-- Quick actions: toggle + usage bar -->
      <div class="quick-actions">
        <div class="toggle-wrap">
          <span class="toggle-label">AI</span>
          <button class="toggle-switch active" id="aiToggle" type="button" role="switch" aria-checked="true" aria-label="AI 回复开关"></button>
        </div>
        <div class="usage-bar-wrap">
          <div class="usage-bar-header">
            <span class="usage-bar-label">今日用量</span>
            <span class="usage-bar-count" id="usageCount">0/50</span>
          </div>
          <div class="usage-bar-track">
            <div class="usage-bar-fill" id="usageFill" style="width:0%;background:var(--success);"></div>
          </div>
        </div>
      </div>

      <!-- Persona chips -->
      <div class="persona-section">
        <div class="persona-section-label">AI 角色</div>
        <div class="persona-chips" id="personaChips">
          <button class="persona-chip active" type="button">加载中...</button>
        </div>
      </div>
    </div>

    <div class="not-configured" id="notConfigured" style="display:none;">
      <p>初次使用？请先配置 AI 服务商</p>
      <button class="btn btn-primary" id="openSettingsBtn" type="button">⚙️ 去配置 API</button>
    </div>
  </div>

  <footer class="footer"><span id="versionText"></span></footer>

  <script src="popup.js"></script>
</body>
</html>
