<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGenius AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: white;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 700;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 12px;
      color: #a0a0a0;
      margin-bottom: 6px;
    }
    
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      background: #1a1a2e;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input:focus, select:focus {
      border-color: #7c3aed;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: white;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.success {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    
    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
    
    .footer a {
      color: #7c3aed;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">💬</div>
    <span class="logo-text">ChatGenius AI</span>
  </div>
  
  <div class="form-group">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>
  
  <div class="form-group">
    <label for="model">AI Model</label>
    <select id="model">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
      <option value="claude-3-sonnet">Claude 3 Sonnet</option>
      <option value="moonshot-v1-8k">Kimi (Moonshot)</option>
      <option value="qwen-turbo">通义千问</option>
    </select>
  </div>
  
  <div class="form-group">
    <label for="tone">Reply Tone</label>
    <select id="tone">
      <option value="professional">Professional</option>
      <option value="friendly">Friendly</option>
      <option value="casual">Casual</option>
      <option value="formal">Formal</option>
    </select>
  </div>
  
  <button class="btn btn-primary" id="save">Save Settings</button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <div class="footer">
    Need help? <a href="https://chatgenius.ai/docs" target="_blank">Documentation</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
